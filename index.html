<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genially Fix v10</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: #111; color: white; }
        #panel { width: 350px; background: #1a1a1a; padding: 20px; overflow-y: auto; border-right: 2px solid #bc13fe; }
        .card { background: #252525; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #bc13fe; }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #000; color: #00f7ff; border: 1px solid #444; border-radius: 4px; box-sizing: border-box; }
        label { font-size: 11px; color: #888; text-transform: uppercase; display: block; margin-top: 10px; }
        #view { flex-grow: 1; padding: 20px; background: #000; display: flex; flex-direction: column; }
        .win { flex-grow: 1; border: 1px solid #333; border-radius: 10px; overflow: hidden; background: #050505; }
        .btn-copy { background: #bc13fe; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div id="panel">
    <h2>Editor v10.0</h2>
    <label>Герой (PNG):</label>
    <input type="text" id="h-url" value="https://cdn-icons-png.flaticon.com/512/616/616430.png" oninput="draw()">
    <label>Цвет (HEX):</label>
    <input type="color" id="h-col" value="#bc13fe" oninput="draw()">
    <label>Текст победы:</label>
    <input type="text" id="w-m" value="УРА! ТЫ ПРАВИЛЬНО ОТВЕТИЛ!" oninput="draw()">
    <label>Текст проигрыша:</label>
    <input type="text" id="l-m" value="ОЙ! ПОПРОБУЙ ЕЩЕ РАЗ" oninput="draw()">
    
    <div id="q-list"></div>
    <button class="btn-copy" onclick="copyIt()">СКОПИРОВАТЬ КОД</button>
</div>

<div id="view">
    <div id="f-box" class="win"></div>
</div>

<script>
    let qs = [
        {q:"Apple?", a:["Яблоко","Груша","Банан"], c:0},
        {q:"Cat?", a:["Собака","Кот","Лев"], c:1},
        {q:"Red?", a:["Синий","Красный","Зеленый"], c:1},
        {q:"One+One?", a:["1","2","3"], c:1},
        {q:"Sun?", a:["Луна","Звезда","Солнце"], c:2},
        {q:"Water?", a:["Вода","Огонь","Земля"], c:0},
        {q:"Big?", a:["Малый","Большой","Средний"], c:1},
        {q:"Mother?", a:["Папа","Мама","Брат"], c:1},
        {q:"Green?", a:["Зеленый","Желтый","Серый"], c:0},
        {q:"Friend?", a:["Враг","Друг","Сосед"], c:1},
        {q:"Jump?", a:["Бег","Прыжок","Сон"], c:1},
        {q:"Book?", a:["Книга","Ручка","Лист"], c:0},
        {q:"Dog?", a:["Кот","Собака","Волк"], c:1},
        {q:"Sky?", a:["Земля","Небо","Трава"], c:1}
    ];

    function render() {
        const c = document.getElementById('q-list');
        c.innerHTML = '';
        qs.forEach((q, i) => {
            const d = document.createElement('div'); d.className = 'card';
            d.innerHTML = `<input type="text" value="${q.q}" oninput="qs[${i}].q=this.value;draw()">
            <div style="display:flex;gap:2px"><input type="text" value="${q.a[0]}" oninput="qs[${i}].a[0]=this.value;draw()"><input type="text" value="${q.a[1]}" oninput="qs[${i}].a[1]=this.value;draw()"><input type="text" value="${q.a[2]}" oninput="qs[${i}].a[2]=this.value;draw()"></div>`;
            c.appendChild(d);
        });
    }

    function getCode() {
        const h = document.getElementById('h-url').value;
        const col = document.getElementById('h-col').value;
        const wm = document.getElementById('w-m').value;
        const lm = document.getElementById('l-m').value;
        const data = JSON.stringify(qs);

        return `<iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body,html{margin:0;padding:0;overflow:hidden;background:#000;height:600px;width:800px;font-family:sans-serif}canvas{display:block}#ui{position:absolute;top:10px;left:10px;z-index:10;display:flex;gap:5px}.b{background:rgba(0,0,0,0.8);color:#fff;padding:5px 10px;border-radius:8px;border:1px solid ${col};font-size:12px}#q{position:absolute;top:200px;left:400px;transform:translate(-50%,-50%);background:rgba(10,10,10,0.95);border:2px solid ${col};border-radius:15px;padding:20px;width:260px;color:#fff;text-align:center;display:none;z-index:20;box-shadow:0 0 30px ${col}55}.bt{background:rgba(255,255,255,0.1);border:1px solid ${col};color:#fff;width:100%;padding:10px;margin:5px 0;border-radius:10px;cursor:pointer;font-weight:bold}</style></head><body><div id="ui"><div class="b" id="hp">❤️ ❤️ ❤️</div><div class="b" id="st">STEP: 1/14</div></div><div id="q"><div id="qt" style="font-size:18px;margin-bottom:15px"></div><div id="as"></div></div><canvas id="c" width="800" height="600"></canvas><script>const img=new Image();img.src="${h}";const cvs=document.getElementById("c"),ctx=cvs.getContext("2d"),tasks=${data};let cur=0,liv=3,jT=1,sP={x:30,y:550},tP={x:30,y:550},hP={x:30,y:550};const pls=[];for(let i=0;i<15;i++){pls.push({x:30+(i*50),y:550-(i*25)})}function dP(x,y,a){ctx.save();ctx.translate(x,y);ctx.fillStyle=a?"${col}":"#333";ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(25,-12);ctx.lineTo(50,0);ctx.lineTo(25,12);ctx.closePath();ctx.fill();ctx.restore()}function dH(x,y,t){const b=Math.sin(t*Math.PI)*40;if(img.complete)ctx.drawImage(img,x,y-b-55,50,60)}function u(){ctx.clearRect(0,0,800,600);pls.forEach((p,i)=>dP(p.x,p.y,i<=cur));if(jT<1){jT+=0.05;hP.x=sP.x+(tP.x-sP.x)*jT;hP.y=sP.y+(tP.y-sP.y)*jT;if(jT>=1){jT=1;if(cur<14)uQ();else end(true)}}dH(hP.x,hP.y,jT);requestAnimationFrame(u)}function end(w){const box=document.getElementById("q");box.style.display="block";box.innerHTML="<h2>"+(w?"${wm}":"${lm}")+"</h2><button class=\'bt\' onclick=\'location.reload()\'>RESTART</button>"}function uQ(){document.getElementById("st").innerText="STEP: "+(cur+1)+"/14";document.getElementById("q").style.display="block";document.getElementById("qt").innerText=tasks[cur].q;const b=document.getElementById("as");b.innerHTML="";tasks[cur].a.forEach((t,i)=>{const btn=document.createElement("button");btn.className="bt";btn.innerText=t;btn.onclick=()=>{if(i===tasks[cur].c){document.getElementById("q").style.display="none";sP={x:hP.x,y:hP.y};cur++;tP={x:pls[cur].x,y:pls[cur].y};jT=0}else{liv--;document.getElementById("hp").innerText="❤️ ".repeat(liv);if(liv<=0)end(false)}};b.appendChild(btn)})}setTimeout(()=>{uQ();u()},500);<\/script></body></html>' style='width:100%;height:600px;border:none;'></iframe>`;
    }

    function draw() { document.getElementById('f-box').innerHTML = getCode(); }
    function copyIt() { const el = document.createElement('textarea'); el.value = getCode(); document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el); alert("Код скопирован!"); }
    render(); draw();
</script>
</body>
</html>
